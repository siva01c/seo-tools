name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    name: Run tests in Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build --target test -t metadata-crawler:test .

      - name: Run test suite
        run: docker run --rm metadata-crawler:test
