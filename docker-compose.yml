services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: metadata-crawler-app
    # Runs as root so the bind-mounted ./storage (owned by the host user) stays writable
    # regardless of the host UID. The production image (Dockerfile final stage) runs as the
    # non-root `seobot` user.
    user: '0'
    network_mode: 'host'
    env_file:
      - .env
    environment:
      APIFY_LOCAL_STORAGE_DIR: /home/seobot/storage
    volumes:
      - ./storage:/home/seobot/storage
      - ./config:/home/seobot/config
      - ./scripts:/home/seobot/scripts
      - ./src:/home/seobot/src
    command: ['sleep', 'infinity']

  typecheck:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    profiles: ['tools']
    env_file:
      - .env
    volumes:
      - ./storage:/home/seobot/storage
    command: npx tsc --noEmit

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    profiles: ['tools']
    env_file:
      - .env
    volumes:
      - ./storage:/home/seobot/storage

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: seo-tools-mcp
    env_file:
      - ../.env.shared
      - .env
    environment:
      NODE_ENV: 'production'
      APIFY_LOCAL_STORAGE_DIR: /home/seobot/storage
      MCP_PORT: '3000'
      FRONTEND_DIR: '/home/seobot/frontend/public'
      VIRTUAL_HOST: 'seo.ludekkvapil.cz,seo.local'
      LETSENCRYPT_HOST: 'seo.ludekkvapil.cz'
      VIRTUAL_PORT: '3000'
      VIRTUAL_PROTO: 'http'
      VIRTUAL_NETWORK: 'agentic-ops'
      HTTPS_METHOD: 'noredirect'
    volumes:
      - ./storage:/home/seobot/storage
      # config_seo.toml publishes here (publishDir = "public/seo"); mount just the SEO
      # subsite, not the whole portfolio public/ tree, so unrelated pages aren't served.
      - ../ludekkvapil/public/seo:/home/seobot/frontend/public:ro
    ports:
      # Bound to localhost only: public traffic must go through ops-proxy on the agentic-ops
      # network, which is the only party allowed to set X-Forwarded-For (see clientIp() in
      # mcp-server.ts). Publishing this on 0.0.0.0 would let anyone bypass the proxy and forge
      # that header directly, defeating all per-IP rate limiting (ASVS 4.1.3).
      - '127.0.0.1:3001:3000'
    # xvfb provides a display for crawls that retry with a visible browser
    command: ['sh', '-c', './start_xvfb_and_run_cmd.sh && node dist/src/mcp-server.js']
    restart: unless-stopped
    networks:
      - agentic-ops

networks:
  agentic-ops:
    external: true
